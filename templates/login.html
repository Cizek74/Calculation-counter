<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přihlášení — Kalkulačka tisků</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] } } }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080b1a;
            background-image:
                radial-gradient(ellipse 55% 45% at 25% 15%, rgba(99,102,241,.20) 0%, transparent 55%),
                radial-gradient(ellipse 45% 40% at 75% 85%, rgba(139,92,246,.16) 0%, transparent 55%),
                radial-gradient(ellipse 30% 30% at 50% 50%, rgba(59,130,246,.06) 0%, transparent 60%);
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(99,102,241,.12); top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: rgba(139,92,246,.10); bottom: -80px; right: -60px; animation-delay: -6s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            padding: 0 16px;
        }

        /* Logo */
        .logo-ring {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 0 32px rgba(99,102,241,.50), 0 0 64px rgba(99,102,241,.20);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            position: relative;
        }
        .logo-ring::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 19px;
            background: linear-gradient(135deg, rgba(99,102,241,.4), rgba(139,92,246,.2));
            z-index: -1;
            filter: blur(6px);
        }

        /* Card */
        .login-card {
            background: rgba(255,255,255,.045);
            border: 1px solid rgba(255,255,255,.09);
            border-radius: 24px;
            backdrop-filter: blur(28px);
            padding: 36px 32px;
            box-shadow:
                0 24px 64px rgba(0,0,0,.55),
                inset 0 1px 0 rgba(255,255,255,.09);
        }

        /* Error */
        .error-box {
            background: rgba(239,68,68,.09);
            border: 1px solid rgba(239,68,68,.25);
            border-radius: 10px;
            padding: 11px 14px;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px;
        }

        /* Label */
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: rgba(255,255,255,.30);
            margin-bottom: 8px;
        }

        /* Input */
        .pw-input {
            width: 100%;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 14px;
            color: rgba(255,255,255,.88);
            outline: none;
            transition: all .22s;
            font-family: inherit;
            letter-spacing: .08em;
            margin-bottom: 20px;
        }
        .pw-input:focus {
            border-color: rgba(99,102,241,.65);
            background: rgba(99,102,241,.09);
            box-shadow: 0 0 0 3px rgba(99,102,241,.14), 0 0 24px rgba(99,102,241,.12);
        }
        .pw-input::placeholder {
            color: rgba(255,255,255,.18);
            letter-spacing: .35em;
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all .22s;
            box-shadow: 0 4px 20px rgba(99,102,241,.38);
            font-family: inherit;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(99,102,241,.55);
        }
        .btn-login:active { transform: translateY(0); }
    </style>
</head>
<body>

    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-wrap">

        <!-- Logo + heading -->
        <div class="text-center mb-8">
            <div class="logo-ring">
                <i data-lucide="printer" class="w-6 h-6 text-white"></i>
            </div>
            <h1 class="text-xl font-extrabold text-white mb-1">Kalkulačka tisků</h1>
            <p class="text-sm" style="color:rgba(255,255,255,.35);">Přihlaste se pro přístup</p>
        </div>

        <!-- Card -->
        <div class="login-card">

            {% if error %}
            <div class="error-box">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0" style="color:#f87171;"></i>
                <span class="text-sm font-semibold" style="color:rgba(248,113,113,.9);">{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <label for="username" class="field-label">Uživatelské jméno</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autofocus
                    required
                    autocomplete="username"
                    placeholder="admin"
                    class="pw-input"
                    style="letter-spacing: normal;"
                >
                <label for="password" class="field-label">Heslo</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    placeholder="••••••••"
                    class="pw-input"
                >
                <button type="submit" class="btn-login">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Přihlásit se
                </button>
            </form>

        </div>
    </div>

    <script>lucide.createIcons();</script>

    <footer style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:.75rem;font-size:.7rem;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.06);background:rgba(8,11,26,.8);backdrop-filter:blur(8px);">
        Software vytvořil <span style="color:rgba(255,255,255,.55);">Ondřej Čížek</span>
    </footer>
</body>
</html>
